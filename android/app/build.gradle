// File: android/build.gradle (NOT app/build.gradle)
buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0'
        // Add other classpaths if needed (e.g., for Google Services)
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

// ---- Add or update this ext block ----
ext {
    compileSdkVersion = 34
    minSdkVersion = 21
    targetSdkVersion = 34

    androidxAppCompatVersion = "1.6.1"
    androidxCoordinatorLayoutVersion = "1.2.0"
    coreSplashScreenVersion = "1.0.1"
    junitVersion = "4.13.2"
    androidxJunitVersion = "1.1.5"
    androidxEspressoCoreVersion = "3.5.1"
}