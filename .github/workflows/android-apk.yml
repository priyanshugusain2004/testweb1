name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Install Capacitor plugins
        run: |
          npm install @capacitor/splash-screen @capacitor/keyboard @capacitor/status-bar @capacitor/app --save || true

      - name: Build web assets
        run: npm run build

      - name: Ensure Capacitor Android platform
        run: |
          npx cap sync android || true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK (API 36)
        uses: r0adkll/setup-android@v2
        with:
          api-level: 36
          build-tools: '36.0.0'
          target: android-36

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build Android (debug)
        working-directory: android
        run: |
          ./gradlew assembleDebug -Porg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx1536m"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
